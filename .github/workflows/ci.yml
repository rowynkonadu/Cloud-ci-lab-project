name: Rowyn's Cloud App CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Echo build message
        run: echo "Building Rowyn's Cloud App..."

      - name: Print Python version
        run: python --version

      - name: Run app
        run: python app.py

      - name: Run test command
        run: echo "All tests passed for Rowyn's Cloud App!"
      